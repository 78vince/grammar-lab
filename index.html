<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英語文法學習網 | English Grammar Learning</title>
    <meta name="description" content="依照 CEFR 分級的互動式英語文法學習網站。透過繁體中文解說與英文例句，系統化學習 A1 至 C2 各級文法。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="grammar-style.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav id="nav-bar" class="nav-bar" aria-label="主要導覽">
        <div class="nav-inner">
            <a href="#/" id="nav-logo" class="nav-logo" aria-label="回到首頁">
                <span class="nav-logo-icon">📖</span>
                <span class="nav-logo-text">GrammarLab</span>
            </a>
            <div id="nav-breadcrumb" class="nav-breadcrumb"></div>
            <button id="nav-export-btn" class="nav-export-btn hidden" aria-label="匯出至 Google Docs">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                <span>匯出</span>
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-root" class="app-root" role="main">
        <!-- Dynamic content rendered here by grammar-app.js -->
        <div id="loading-skeleton" class="loading-skeleton">
            <div class="skeleton-hero">
                <div class="skeleton-line skeleton-line--title"></div>
                <div class="skeleton-line skeleton-line--subtitle"></div>
            </div>
            <div class="skeleton-grid">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </div>
    </main>

    <!-- Export Modal -->
    <div id="export-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="export-modal-title">
        <div class="modal-content">
            <h2 id="export-modal-title" class="modal-title">📋 內容已複製到剪貼簿</h2>
            <div class="modal-body">
                <p>您可以按照以下步驟匯出至 Google Docs：</p>
                <ol>
                    <li>開啟 <a href="https://docs.google.com" target="_blank" rel="noopener">Google Docs</a> 並建立新文件</li>
                    <li>按下 <kbd>Ctrl</kbd>+<kbd>V</kbd>（Mac 使用 <kbd>⌘</kbd>+<kbd>V</kbd>）貼上內容</li>
                    <li>選取所有文字後，使用 Google Docs 的「格式」選單修正標題層級</li>
                </ol>
                <div id="export-status" class="export-status"></div>
            </div>
            <button id="export-modal-close" class="btn btn--primary modal-close-btn" aria-label="關閉">了解</button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden" role="alert" aria-live="polite"></div>

    <script src="grammar-data.js"></script>
    <script src="grammar-app.js"></script>
</body>
</html>
